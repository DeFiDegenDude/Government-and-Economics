<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* This sets the global background for the entire browser window */
        html, body {
            height: 100%;
            margin: 0;
            /* This matches the maroon in your original image */
            background-color: #800000; 
        }

        body {
            font-family: "Georgia", serif;
            display: flex;
            justify-content: center;
            padding: 80px 20px;
            color: #b3850e;
        }

        .quote-container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 60px;
            color: #b3850e;
            /* Optional: subtle divider like the image style */
            border-bottom: 1px solid #674ea7;
            padding-bottom: 20px;
        }

        .quote-block {
            margin-bottom: 70px;
        }

        p.quote-text {
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .attribution {
            text-align: right;
            font-size: 1.1rem;
            font-style: italic;
            color: #b3850e;
        }

        .author {
            font-weight: bold;
            font-style: normal;
        }

        /* Styling for the links you had in your list */
        a {
            color: #b3850e;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="quote-container">
    <h1> Socialist Quotebook</h1>

<div class="quote-block">
        <p class="quote-text">"When a beggar asks us for a quarter, our instinct is to say that the State has already confiscated our quarter for his benefit, and he should go to the State about it."</p>
        <p class="attribution"><span class="author">Albert Jay Nock</span>, <a href="https://mises.org/library/book/our-enemy-state"><em>Our Enemy, the State</em></a></p>
    </div>

</div>


</body>
</html>
